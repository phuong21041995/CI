<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpEx Hub — Bộ Tài Liệu Cải Tiến</title>

<!-- Fonts: Noto Serif (display) + Be Vietnam Pro (body). Lần đầu cần mạng, sau cache lại. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=Noto+Serif:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

<!-- Xuất ảnh mindmap -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><span class="mark">❋</span> OpEx Hub</div>
      <h1>Bộ Tài Liệu<br>Cải Tiến</h1>
      <div class="sub">Con người đi trước, công cụ theo sau.</div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="search" placeholder="Tìm trong nội dung…" autocomplete="off">
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">Công cụ đưa ta đi.<br>Cái tâm quyết định ta đi về đâu.</div>
  </aside>

  <main class="main">
    <div class="main-inner" id="main-inner"></div>
  </main>
</div>

<div id="toast">
  <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
  <span>Thông báo</span>
</div>

<script type="module" src="js/app.js"></script>
<script>
  // Đăng ký Service Worker để cache offline (chỉ chạy khi phục vụ qua http/https).
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
